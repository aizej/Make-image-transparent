<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      font-family: sans-serif;
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #fff;
      color: #111;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }

    #drop-zone {
      border: 1.5px dashed #bbb;
      border-radius: 12px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s;
      background: #f7f7f5;
    }

    #drop-zone:hover, #drop-zone.drag-over {
      background: #efefec;
    }

    #file-input { display: none; }

    .preview-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 1.5rem;
    }

    .preview-box {
      border: 0.5px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      /* checkerboard to show transparency */
      background: repeating-conic-gradient(#ccc 0% 25%, #fff 0% 50%) 0 0 / 16px 16px;
    }

    .preview-box img, .preview-box canvas {
      width: 100%;
      display: block;
      max-height: 280px;
      object-fit: contain;
    }

    .label {
      font-size: 12px;
      color: #666;
      padding: 6px 10px;
      background: #f7f7f5;
      border-top: 0.5px solid #ddd;
    }

    #controls {
      margin-top: 1rem;
      display: none;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    #process-btn, #download-btn {
      padding: 7px 18px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      border: 0.5px solid #bbb;
      background: #fff;
      color: #111;
    }

    #process-btn:hover, #download-btn:hover {
      background: #f0f0ee;
    }

    #download-btn { display: none; }

    .range-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 200px;
    }

    .range-row label {
      font-size: 13px;
      color: #555;
      white-space: nowrap;
    }

    .range-row input { flex: 1; }

    .range-val {
      font-size: 13px;
      font-weight: 500;
      min-width: 34px;
      text-align: right;
    }

    #status {
      font-size: 13px;
      color: #666;
      margin-top: 0.5rem;
      min-height: 18px;
    }
  </style>
</head>
<body>

  

  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    <input type="file" id="file-input" accept="image/*">
    <div style="font-size: 28px; margin-bottom: 8px; line-height:1;">⬆</div>
    <p style="margin:0; font-size: 15px; font-weight: 500;">Drop image here or click to upload</p>
    <p style="margin:4px 0 0; font-size: 13px; color: #666;">PNG, JPG, WEBP supported</p>
  </div>

  <div id="controls">
    <div style="display:flex; gap:16px; flex-wrap:wrap; width:100%; align-items:center;">
      <label style="font-size:13px; color:#555; display:flex; align-items:center; gap:6px; cursor:pointer;">
        <input type="checkbox" id="threshold-enabled" checked>
        Use threshold
      </label>
      <label style="font-size:13px; color:#555; display:flex; align-items:center; gap:6px; cursor:pointer;">
        Make transparent:
        <select id="mode" style="font-size:13px; padding:4px 8px; border-radius:6px; border:0.5px solid #bbb; background:#fff; cursor:pointer;">
          <option value="white">White (bright pixels)</option>
          <option value="black">Black (dark pixels)</option>
        </select>
      </label>
    </div>
    <div class="range-row" id="threshold-row">
      <label>Threshold</label>
      <input type="range" id="threshold" min="0" max="255" value="240" step="1">
      <span class="range-val" id="threshold-val">240</span>
    </div>
    <button id="process-btn">Process</button>
    <button id="download-btn">Download PNG ↓</button>
  </div>

  <p id="status"></p>

  <div class="preview-row" id="preview-row" style="display:none;">
    <div>
      <div class="preview-box"><img id="original-preview" alt="original"></div>
      <div class="label">Original</div>
    </div>
    <div>
      <div class="preview-box"><canvas id="output-canvas"></canvas></div>
      <div class="label">Processed — white → transparent</div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const controls = document.getElementById('controls');
    const processBtn = document.getElementById('process-btn');
    const downloadBtn = document.getElementById('download-btn');
    const thresholdSlider = document.getElementById('threshold');
    const thresholdVal = document.getElementById('threshold-val');
    const thresholdEnabled = document.getElementById('threshold-enabled');
    const thresholdRow = document.getElementById('threshold-row');
    const modeSelect = document.getElementById('mode');
    const status = document.getElementById('status');
    const originalPreview = document.getElementById('original-preview');
    const outputCanvas = document.getElementById('output-canvas');
    const previewRow = document.getElementById('preview-row');
    let loadedImage = null;

    thresholdSlider.oninput = () => { thresholdVal.textContent = thresholdSlider.value; };

    thresholdEnabled.onchange = () => {
      thresholdRow.style.opacity = thresholdEnabled.checked ? '1' : '0.4';
      thresholdRow.style.pointerEvents = thresholdEnabled.checked ? '' : 'none';
    };

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) loadFile(file);
    });

    fileInput.onchange = () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); };

    function loadFile(file) {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          loadedImage = img;
          originalPreview.src = e.target.result;
          previewRow.style.display = 'grid';
          controls.style.display = 'flex';
          downloadBtn.style.display = 'none';
          status.textContent = `Loaded: ${img.width} x ${img.height}px`;
          processImage();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function processImage() {
      if (!loadedImage) return;
      const useThreshold = thresholdEnabled.checked;
      const threshold = parseInt(thresholdSlider.value);
      const makeWhiteTransparent = modeSelect.value === 'white';
      const w = loadedImage.width;
      const h = loadedImage.height;

      const src = document.createElement('canvas');
      src.width = w; src.height = h;
      const sCtx = src.getContext('2d');
      sCtx.drawImage(loadedImage, 0, 0);
      const srcData = sCtx.getImageData(0, 0, w, h);

      outputCanvas.width = w;
      outputCanvas.height = h;
      const ctx = outputCanvas.getContext('2d');
      const out = ctx.createImageData(w, h);
      const d = srcData.data;
      const o = out.data;

      for (let i = 0; i < d.length; i += 4) {
        const r = d[i], g = d[i+1], b = d[i+2];
        // Perceived luminance (matches Pillow's convert('L'))
        const gray = Math.round(0.299 * r + 0.587 * g + 0.114 * b);

        let alpha;
        if (!useThreshold) {
          // Direct formula like the Python script:
          // white transparent: alpha = 255 - gray  (white=0, black=255)
          // black transparent: alpha = gray         (black=0, white=255)
          alpha = makeWhiteTransparent ? (255 - gray) : gray;
        } else {
          if (makeWhiteTransparent) {
            // Pixels at or above threshold fade to transparent
            alpha = gray >= threshold
              ? Math.round((255 - gray) * (255 / Math.max(1, 255 - threshold)))
              : 255;
          } else {
            // Pixels at or below threshold fade to transparent
            alpha = gray <= threshold
              ? Math.round(gray * (255 / Math.max(1, threshold)))
              : 255;
          }
        }

        o[i] = r;
        o[i+1] = g;
        o[i+2] = b;
        o[i+3] = Math.max(0, Math.min(255, alpha));
      }

      ctx.putImageData(out, 0, 0);
      downloadBtn.style.display = 'inline-block';

      const modeDesc = makeWhiteTransparent ? 'white → transparent' : 'black → transparent';
      const threshDesc = useThreshold ? ` | threshold: ${threshold}` : ' | no threshold (direct alpha)';
      status.textContent = `Done. Mode: ${modeDesc}${threshDesc}.`;
    }

    processBtn.onclick = processImage;

    downloadBtn.onclick = () => {
      const link = document.createElement('a');
      link.download = 'transparent.png';
      link.href = outputCanvas.toDataURL('image/png');
      link.click();
    };
  </script>

</body>
</html>
